name: Docs to PDF

on:
  push:
    tags:
    - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install md-to-pdf
        run: |-
          npm install -g md-to-pdf

      - name: Build using md-to-pdf
        run: |-
          cat index_pdf.md pages/*.md | md-to-pdf --launch-options '{ "args": ["--no-sandbox"] }' > linux-cheatsheet.pdf

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          archive: false
          if-no-files-found: error
          path: linux-cheatsheet.pdf
          
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          files: |
            linux-cheatsheet.pdf
